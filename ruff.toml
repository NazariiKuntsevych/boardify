line-length = 120

[lint]
select = [
    "E",       # code style
    "F",       # code errors
    "W",       # warnings
    "I",       # sorting
    "N",       # naming
    "ANN",     # annotations
    "Q",       # quotes
]
ignore = [
    "ANN002",  # annotations for *args
    "ANN003",  # annotations for **kwargs
    "ANN204",  # return annotations for magic methods
]
